{% extends "base.html" %}
{% block title %}Admin Login · Tipprunde 2026{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card">
        <div class="section-head">
            <h2>Admin Login</h2>
            <span class="section-badge admin-badge">Verwaltung</span>
        </div>

        <p class="auth-text">
            Gib den Admin-Code ein, um Teilnehmer, Spiele, Ergebnisse und Regeln zu verwalten.
        </p>

        <form method="post" class="stack-form">
            <input type="password" name="code" placeholder="Admin-Code" required>
            <button class="btn btn-admin" type="submit">Admin-Modus öffnen</button>
        </form>
    </div>
</section>
{% endblock %}
